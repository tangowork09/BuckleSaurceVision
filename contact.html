<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Bucks Sauce Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800&family=Rye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html"><img src="assets/bucks-logo.svg" alt="Bucks Sauce"></a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="wholesale.html">Wholesale</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="faq.html">FAQ</a>
      <a href="#" data-cart-open>Cart(<span class="cart-count">0</span>)</a>
    </div>
    
  </nav>

  <header class="page-hero">
    <h1>Contact</h1>
    <p class="sub">Questions about the sauce, an order, or wholesale? Write in — a human answers fast.</p>
  </header>

  <main class="wrap">
    <div class="form-grid">
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Your message"></textarea>
      <button class="btn btn-orange" onclick="alert('Contact form is a demo stub.')">
        <span class="lbl">Send</span><span class="lbl-hover">Send</span>
      </button>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <div class="footer-bottom">
        <div>© Bucks Sauce clone — local design study.</div>
        <div class="footer-links"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
      </div>
    </div>
  </footer>

  <div id="cart-overlay"></div>
  <aside id="cart-drawer" aria-label="Cart">
    <div class="cart-head"><h3>Your Cart</h3><button class="cart-close" data-cart-close aria-label="Close cart">×</button></div>
    <div id="best-value" class="best-value" style="display:none;">Best value: grab a 3-pack, save some bucks</div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-foot">
      <div class="cart-total"><span>Total</span><span id="cart-total">$0.00</span></div>
      <div id="ship-note" style="font-size:0.8rem;opacity:0.7;margin-bottom:12px;"></div>
      <button class="btn btn-orange" onclick="alert('Checkout is a demo stub.')"><span class="lbl">Checkout</span><span class="lbl-hover">Checkout</span></button>
    </div>
  </aside>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
